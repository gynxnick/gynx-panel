<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="25%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#2a1658" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#14092e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#07030f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cornerGlow" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="15%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#5b21b6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hexGrid" x="0" y="0" width="90" height="104" patternUnits="userSpaceOnUse">
      <path d="M45 2 L87 26 L87 78 L45 102 L3 78 L3 26 Z"
            fill="none" stroke="#8b5cf6" stroke-width="0.6" stroke-opacity="0.08"/>
    </pattern>
    <pattern id="dotMatrix" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#c4b5fd" fill-opacity="0.12"/>
    </pattern>
    <pattern id="circuit" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M0 50 L80 50 L90 60 L90 110 L100 120 L180 120"
            fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.1"/>
      <path d="M50 0 L50 70 L60 80 L130 80 L140 90 L140 200"
            fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.08"/>
      <circle cx="90" cy="60" r="1.5" fill="#c4b5fd" fill-opacity="0.25"/>
      <circle cx="140" cy="90" r="1.5" fill="#c4b5fd" fill-opacity="0.25"/>
      <circle cx="50" cy="70" r="1" fill="#a78bfa" fill-opacity="0.2"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="1" fill="#ffffff" fill-opacity="0.015"/>
    </pattern>
    <linearGradient id="cubeFace1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="cubeFace2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cubeFace3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2e1065" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#0a0514"/>
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect width="1920" height="1080" fill="url(#cornerGlow)"/>
  <rect width="1920" height="1080" fill="url(#bottomGlow)"/>
  <rect width="1920" height="1080" fill="url(#hexGrid)"/>
  <rect x="0" y="0" width="1100" height="1080" fill="url(#circuit)" opacity="0.7"/>
  <rect width="1920" height="1080" fill="url(#dotMatrix)"/>

  <g transform="translate(340, 560)" opacity="0.85">
    <circle cx="0" cy="0" r="180" fill="#7c3aed" fill-opacity="0.15" filter="url(#strongGlow)"/>
    <polygon points="0,-90 90,-45 0,0 -90,-45" fill="url(#cubeFace1)" stroke="#c4b5fd" stroke-width="1" stroke-opacity="0.5"/>
    <polygon points="-90,-45 0,0 0,90 -90,45" fill="url(#cubeFace3)" stroke="#c4b5fd" stroke-width="1" stroke-opacity="0.4"/>
    <polygon points="90,-45 0,0 0,90 90,45" fill="url(#cubeFace2)" stroke="#c4b5fd" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="0" y1="-90" x2="0" y2="0" stroke="#e9d5ff" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="90" stroke="#e9d5ff" stroke-width="0.8" stroke-opacity="0.3"/>
  </g>

  <g transform="translate(720, 240)" opacity="0.7">
