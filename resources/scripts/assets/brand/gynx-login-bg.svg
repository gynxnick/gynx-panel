    <line x1="340" y1="560" x2="880" y2="800"/>
    <line x1="340" y1="560" x2="180" y2="380"/>
    <line x1="720" y1="240" x2="520" y2="140"/>
    <line x1="720" y1="240" x2="940" y2="420"/>
    <line x1="880" y1="800" x2="940" y2="420"/>
  </g>

