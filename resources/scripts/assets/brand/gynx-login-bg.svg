    <circle cx="1080" cy="280" r="1.1" fill-opacity="0.4"/>
    <circle cx="1240" cy="600" r="0.9" fill-opacity="0.35"/>
    <circle cx="1380" cy="180" r="1" fill-opacity="0.4"/>
    <circle cx="1540" cy="780" r="1.2" fill-opacity="0.4"/>
    <circle cx="1680" cy="480" r="0.9" fill-opacity="0.4"/>
    <circle cx="1720" cy="920" r="1" fill-opacity="0.35"/>
