    <circle cx="780" cy="520" r="6" fill="#a855f7" fill-opacity="0.2" filter="url(#softGlow)"/>
    <circle cx="460" cy="340" r="1.8" fill="#e9d5ff" fill-opacity="0.7"/>
    <circle cx="460" cy="340" r="5" fill="#a855f7" fill-opacity="0.15" filter="url(#softGlow)"/>
