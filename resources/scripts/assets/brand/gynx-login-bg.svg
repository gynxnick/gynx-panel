    <polygon points="-25,-12 0,0 0,25 -25,12" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
    <polygon points="25,-12 0,0 0,25 25,12" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
  </g>
  <g transform="translate(940, 420)" opacity="0.4">
    <polygon points="0,-18 18,-9 0,0 -18,-9" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
    <polygon points="-18,-9 0,0 0,18 -18,9" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
    <polygon points="18,-9 0,0 0,18 18,9" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
  </g>
  <g transform="translate(60, 780)" opacity="0.3">
    <polygon points="0,-22 22,-11 0,0 -22,-11" fill="none" stroke="#a78bfa" stroke-width="0.7"/>
    <polygon points="-22,-11 0,0 0,22 -22,11" fill="none" stroke="#a78bfa" stroke-width="0.7"/>
    <polygon points="22,-11 0,0 0,22 22,11" fill="none" stroke="#a78bfa" stroke-width="0.7"/>
  </g>

  <g stroke="#a78bfa" stroke-opacity="0.25" stroke-width="0.6" fill="none">
