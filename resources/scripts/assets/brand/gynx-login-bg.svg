    <polygon points="30,-15 0,0 0,30 30,15" fill="url(#cubeFace2)" stroke="#c4b5fd" stroke-width="0.6" stroke-opacity="0.4"/>
  </g>

  <g transform="translate(520, 140)" opacity="0.4">
    <polygon points="0,-20 20,-10 0,0 -20,-10" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
    <polygon points="-20,-10 0,0 0,20 -20,10" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
    <polygon points="20,-10 0,0 0,20 20,10" fill="none" stroke="#a78bfa" stroke-width="0.8"/>
  </g>
  <g transform="translate(180, 380)" opacity="0.35">
