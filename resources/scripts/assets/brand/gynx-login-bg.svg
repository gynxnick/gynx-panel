    <polygon points="-45,-22 0,0 0,45 -45,22" fill="url(#cubeFace3)" stroke="#c4b5fd" stroke-width="0.8" stroke-opacity="0.4"/>
    <polygon points="45,-22 0,0 0,45 45,22" fill="url(#cubeFace2)" stroke="#c4b5fd" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <g transform="translate(880, 800)" opacity="0.6">
