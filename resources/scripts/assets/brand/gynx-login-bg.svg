  <line x1="0" y1="541" x2="1920" y2="541" stroke="#a855f7" stroke-width="1" stroke-opacity="0.04" filter="url(#softGlow)"/>

  <g stroke="#a78bfa" stroke-width="1" stroke-opacity="0.35" fill="none">
