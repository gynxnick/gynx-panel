    <circle cx="530" cy="400" r="1.5" fill-opacity="0.6"/>
    <circle cx="620" cy="180" r="1.5" fill-opacity="0.5"/>
    <circle cx="600" cy="680" r="1.5" fill-opacity="0.6"/>
    <circle cx="820" cy="620" r="1.5" fill-opacity="0.5"/>
    <circle cx="260" cy="470" r="1.5" fill-opacity="0.5"/>
  </g>

  <g font-family="monospace" font-size="10" fill="#a78bfa" opacity="0.25">
    <text x="1150" y="120">01101001</text>
    <text x="1150" y="140">11010110</text>
    <text x="1150" y="160">00101101</text>
    <text x="1780" y="300" opacity="0.7">10110100</text>
    <text x="1780" y="320" opacity="0.5">01011010</text>
    <text x="1780" y="340" opacity="0.3">11001011</text>
    <text x="1420" y="900">11100101</text>
    <text x="1420" y="920" opacity="0.7">00110110</text>
    <text x="1420" y="940" opacity="0.4">10101001</text>
  </g>

